const NATS=["Tout","Rada","Petro","Gede","Nago","Kongo","Ibo","Erzulie"];
let cur="Tout";

function buildTabs(){
  const t=document.getElementById("tabs");
  NATS.forEach(n=>{
    const b=document.createElement("button");
    b.className="tab"+(n===cur?" on":"");
    b.textContent=n;
    b.onclick=()=>{cur=n;document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));b.classList.add("on");render();};
    t.appendChild(b);
  });
}

function render(){
  const q=document.getElementById("srch").value.toLowerCase();
  const list=DATA.filter(l=>{
    const mN=cur==="Tout"||l.nat===cur;
    const mQ=!q||l.name.toLowerCase().includes(q)||l.nat.toLowerCase().includes(q)||l.veve.toLowerCase().includes(q)||l.recit.toLowerCase().includes(q);
    return mN&&mQ;
  });
  document.getElementById("cnt").textContent=list.length+" lwa affiché"+(list.length>1?"s":"");
  const el=document.getElementById("list");
  if(!list.length){el.innerHTML='<div class="no-res">Aucun résultat.</div>';return;}
  el.innerHTML=list.map((l,i)=>`
    <div class="card" id="c${i}" onclick="toggle('c${i}')">
      <div class="card-head">
        <div class="head-left">
          <div class="lname">${l.name}</div>
        </div>
        <div class="head-right">
          <span class="nat nat-${l.nat.replace(/\s/g,"")}">${l.nat}</span>
          <i class="ti ti-chevron-down chev" aria-hidden="true"></i>
        </div>
      </div>
      <div class="card-body">
        <div class="swatches">${l.col.map(c=>`<div class="sw" style="background:${c}" title="${c}"></div>`).join("")}</div>
        <div class="section">
          <div class="slabel">Vèvè — symbole sacré</div>
          <div class="veve-box">${l.veve}</div>
        </div>
        <div class="section">
          <div class="slabel">Récit & tradition</div>
          <div class="sbody">${l.recit}</div>
        </div>
        <div class="section">
          <div class="slabel">Sources</div>
          <div class="sources">${l.sources.map(s=>`<span class="src">${s}</span>`).join("")}</div>
        </div>
      </div>
    </div>
  `).join("");
}

function toggle(id){
  document.getElementById(id).classList.toggle("open");
}

buildTabs();
render();
</script>
