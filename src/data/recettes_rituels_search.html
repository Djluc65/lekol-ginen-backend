const CATS = [

  {id:"bain",  label:"Bains",   bdg:"bdg-bain"},
  {id:"wanga", label:"Wanga",   bdg:"bdg-wanga"},
  {id:"lampe", label:"Lampes",  bdg:"bdg-lamp"},
  {id:"huile", label:"Huiles",  bdg:"bdg-huile"},
  {id:"tisane",label:"Tisanes", bdg:"bdg-tisane"},
];

const LWA_LIST = ["Legba","Erzulie Freda","Danbala","Ogou","Baron Samedi","Agwé","La Sirène","Marassa","Gran Bwa","Azaka","Simbi","Loko"];

const KW_TAGS = [
  "amour","protection","chance","dégagement","mort","purification","sagesse",
  "argent","voyage","force","beauté","fertilité","guérison","maison","sort"
];

const CAT_BDG = {bain:"bdg-bain",wanga:"bdg-wanga",lampe:"bdg-lamp",huile:"bdg-huile",tisane:"bdg-tisane"};
const CAT_LBL = {bain:"Bain",wanga:"Wanga",lampe:"Lampe",huile:"Huile",tisane:"Tisane"};

let curCat = "all", curLwa = "", curKw = "";

function norm(s){ return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""); }

function score(r, q){
  if(!q.trim()) return 1;
  const qn = norm(q);
  let sc = 0;
  if(norm(r.nom).includes(qn)) sc += 12;
  if(norm(r.sub).includes(qn)) sc += 5;
  r.lwa.forEach(l => { if(norm(l).includes(qn)) sc += 8; });
  r.kw.forEach(k => {
    const kn = norm(k);
    if(kn === qn) sc += 10;
    else if(kn.includes(qn)) sc += 5;
    else if(qn.includes(kn) && kn.length > 3) sc += 2;
  });
  return sc;
}

function getResults(){
  const q = document.getElementById("q").value;
  let list = RECETTES;
  if(curCat !== "all") list = list.filter(r => r.cat === curCat);
  if(curLwa) list = list.filter(r => r.lwa.map(norm).includes(norm(curLwa)));
  if(curKw){
    const kn = norm(curKw);
    list = list.filter(r => r.kw.some(k => norm(k).includes(kn)));
  }
  if(q.trim()){
    list = list.map(r=>({...r,_sc:score(r,q)})).filter(r=>r._sc>0).sort((a,b)=>b._sc-a._sc);
  }
  return list;
}

function buildCats(){
  const el = document.getElementById("catRow");
  CATS.forEach(c => {
    const b = document.createElement("button");
    b.className = "cat" + (c.id===curCat?" on":"");
    b.textContent = c.label;
    b.onclick = () => {
      curCat = c.id;
      document.querySelectorAll(".cat").forEach((x,i)=>x.classList.toggle("on",CATS[i].id===c.id));
      rnd();
    };
    el.appendChild(b);
  });
}

function buildLwa(){
  const el = document.getElementById("lwaSec");
  el.innerHTML = '<div class="sect-lbl">Filtrer par lwa</div><div class="lwas" id="lwaRow"></div>';
  const row = document.getElementById("lwaRow");
  LWA_LIST.forEach(l => {
    const b = document.createElement("button");
    b.className = "lwa-btn" + (curLwa===l?" on":"");
    b.textContent = l;
    b.onclick = () => { curLwa = curLwa===l?"":l; buildLwa(); rnd(); };
    row.appendChild(b);
  });
}

function buildKw(){
  const el = document.getElementById("kwSec");
  el.innerHTML = '<div class="sect-lbl">Mots-clés rapides</div><div class="kws" id="kwRow"></div>';
  const row = document.getElementById("kwRow");
  KW_TAGS.forEach(k => {
    const b = document.createElement("button");
    b.className = "kw" + (curKw===k?" on":"");
    b.textContent = k;
    b.style.fontWeight = curKw===k?"500":"400";
    b.onclick = () => {
      curKw = curKw===k?"":k;
      if(!curKw) document.getElementById("q").value="";
      else document.getElementById("q").value=k;
      buildKw(); rnd();
    };
    row.appendChild(b);
  });
}

function rnd(){
  const q = document.getElementById("q").value;
  document.getElementById("clrBtn").style.display = q?"inline":"none";
  const res = getResults();
  document.getElementById("cnt").textContent = res.length+" recette"+(res.length>1?"s":"")+" trouvée"+(res.length>1?"s":"");
  const el = document.getElementById("list");
  if(!res.length){
    el.innerHTML = '<div class="no"><i class="ti ti-search" style="font-size:22px;display:block;margin-bottom:8px" aria-hidden="true"></i>Aucune recette trouvée.<br><span style="font-size:12px">Essaie : bain, amour, protection, wanga, lampe...</span></div>';
    return;
  }
  el.innerHTML = res.map(r => {
    const bdgCls = CAT_BDG[r.cat]||"bdg-bain";
    const catLbl = CAT_LBL[r.cat]||r.cat;
    const lwaHtml = r.lwa.map(l=>`<span class="lwa-tag">${l}</span>`).join("");
    return `<div class="card" id="c-${r.id}" onclick="tog('${r.id}')">
      <div class="card-h">
        <div class="card-left">
          <div class="card-name">${r.urg?'<i class="ti ti-alert-triangle" style="font-size:13px;color:#E24B4A;margin-right:4px" aria-hidden="true"></i>':''}${r.nom}</div>
          <div class="card-sub">${r.sub}</div>
        </div>
        <div class="card-right">
          <span class="bdg ${bdgCls}">${catLbl}</span>
          ${r.urg?'<span class="bdg bdg-urg">Urgent</span>':''}
          <i class="ti ti-chevron-down chev" aria-hidden="true"></i>
        </div>
      </div>
      <div class="body">
        <div class="meta">
          <span><i class="ti ti-star" style="font-size:13px;margin-right:3px" aria-hidden="true"></i>${lwaHtml}</span>
          <span><i class="ti ti-clock" style="font-size:13px;margin-right:3px" aria-hidden="true"></i>${r.duree}</span>
          <span class="moment-tag"><i class="ti ti-sun" style="font-size:12px;margin-right:3px" aria-hidden="true"></i>${r.moment}</span>
        </div>
        <div class="slbl">Ingrédients</div>
        <div class="ingr-grid">${r.ingr.map(i=>`<div class="ingr">${i}</div>`).join("")}</div>
        <div class="slbl">Préparation</div>
        <div class="steps">${r.etapes.map((e,i)=>`<div class="step"><span class="sn">${i+1}.</span><span>${e}</span></div>`).join("")}</div>
        ${r.tip?`<div class="tip"><i class="ti ti-bulb" style="font-size:15px;flex-shrink:0" aria-hidden="true"></i><span>${r.tip}</span></div>`:''}
        ${r.warn?`<div class="warn"><i class="ti ti-shield-exclamation" style="font-size:15px;flex-shrink:0" aria-hidden="true"></i><span>${r.warn}</span></div>`:''}
      </div>
    </div>`;
  }).join("");
}

function tog(id){
  document.getElementById("c-"+id)?.classList.toggle("open");
}

function clr(){
  document.getElementById("q").value="";
  curKw="";
  buildKw();
  rnd();
}

buildCats();
buildLwa();
buildKw();
rnd();
</script>
