const CATS = [
  {id:"all",label:"Tout"},
  {id:"public",label:"Cérémonies"},
  {id:"initiation",label:"Initiation"},
  {id:"funeraire",label:"Funéraire"},
  {id:"bain",label:"Bains rituels"},
  {id:"protection",label:"Protection"},
  {id:"divination",label:"Divination & objets"},
];

const BADGE = {
  public:"b-pub",initiation:"b-ini",funeraire:"b-fun",
  bain:"b-bain",protection:"b-prot",divination:"b-div"
};
const BADGE_LABEL = {
  public:"Cérémonie",initiation:"Initiation",funeraire:"Funéraire",
  bain:"Bain rituel",protection:"Protection",divination:"Divination"
};

const TAGS_POP = ["bain","amour","protection","initiation","mort","guérison","autel","possession","oungan","kanzo","divination","Legba","Erzulie","Ogou","Baron"];

let curCat = "all";
let selected = null;

function score(r, q) {
  if (!q.trim()) return 1;
  const n = s => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const qn = n(q);
  let sc = 0;
  if (n(r.name).includes(qn)) sc += 10;
  r.kw.forEach(k => { const kn=n(k); if(kn===qn) sc+=8; else if(kn.includes(qn)) sc+=4; else if(qn.includes(kn)&&kn.length>3) sc+=2; });
  if (n(r.resume).includes(qn)) sc += 1;
  if (n(r.lwa).includes(qn)) sc += 3;
  if (n(r.sub).includes(qn)) sc += 2;
  return sc;
}

function buildFilters() {
  const f = document.getElementById("filters");
  CATS.forEach(c => {
    const b = document.createElement("button");
    b.className = "ftab" + (c.id===curCat?" on":"");
    b.textContent = c.label;
    b.onclick = () => { curCat=c.id; document.querySelectorAll(".ftab").forEach(x=>x.classList.remove("on")); b.classList.add("on"); render(); };
    f.appendChild(b);
  });
}

function buildTags() {
  const t = document.getElementById("tags");
  TAGS_POP.forEach(tag => {
    const b = document.createElement("button");
    b.className = "tag"; b.textContent = tag;
    b.onclick = () => { document.getElementById("srch").value = tag; render(); };
    t.appendChild(b);
  });
}

function clearSearch() {
  document.getElementById("srch").value = ""; curCat = "all";
  document.querySelectorAll(".ftab").forEach((x,i) => x.classList.toggle("on", i===0));
  selected = null; render();
}

function render() {
  if (selected) { renderDetail(); return; }
  const q = document.getElementById("srch").value;
  let list = DATA.filter(r => curCat==="all" || r.cat===curCat);
  if (q.trim()) {
    list = list.map(r => ({...r, _sc: score(r,q)})).filter(r=>r._sc>0).sort((a,b)=>b._sc-a._sc);
  }
  document.getElementById("cnt").textContent = list.length + " rituel" + (list.length>1?"s":"") + " trouvé" + (list.length>1?"s":"");
  const el = document.getElementById("list");
  if (!list.length) { el.innerHTML = '<div class="no-res"><i class="ti ti-search" style="font-size:24px;display:block;margin-bottom:8px" aria-hidden="true"></i>Aucun rituel pour "' + q + '".<br><span style="font-size:12px">Essaie : bain, protection, initiation, mort, amour...</span></div>'; return; }
  el.innerHTML = list.map(r => `
    <div class="card" id="c-${r.id}" onclick="openDetail('${r.id}')">
      <div class="card-head">
        <div class="head-left">
          <div class="rname">${r.urgence?'<i class="ti ti-alert-triangle" style="font-size:14px;color:#E24B4A;margin-right:4px" aria-hidden="true"></i>':''}${r.name}</div>
          <div class="rsub">${r.sub}</div>
        </div>
        <div class="head-right">
          <span class="badge ${BADGE[r.cat]}">${BADGE_LABEL[r.cat]}</span>
          <i class="ti ti-chevron-right chevron" aria-hidden="true"></i>
        </div>
      </div>
    </div>`).join("");
}

function openDetail(id) {
  selected = DATA.find(r => r.id === id);
  renderDetail();
}

function renderDetail() {
  const r = selected;
  document.getElementById("cnt").textContent = "";
  const el = document.getElementById("list");
  let html = `<button class="back-btn" onclick="selected=null;render()"><i class="ti ti-arrow-left" style="font-size:16px" aria-hidden="true"></i> Retour</button>
  <div class="card open" style="cursor:default">
    <div class="card-head">
      <div class="head-left">
        <div class="rname" style="font-size:16px">${r.urgence?'<i class="ti ti-alert-triangle" style="font-size:15px;color:#E24B4A;margin-right:5px" aria-hidden="true"></i>':''}${r.name}</div>
        <div class="rsub">${r.sub}</div>
      </div>
      <span class="badge ${BADGE[r.cat]}">${BADGE_LABEL[r.cat]}</span>
    </div>
    <div class="card-body" style="display:block">`;

  if (r.urgence) html += `<div class="section"><div class="warn"><i class="ti ti-alert-triangle" style="font-size:16px;flex-shrink:0" aria-hidden="true"></i><span>Rituel urgent — consulter immédiatement un oungan ou manbo qualifié.</span></div></div>`;

  html += `<div class="section">
    <div class="meta-row">
      <div class="meta"><i class="ti ti-user" style="font-size:14px" aria-hidden="true"></i>${r.qui}</div>
      <div class="meta"><i class="ti ti-clock" style="font-size:14px" aria-hidden="true"></i>${r.duree}</div>
      <div class="meta"><i class="ti ti-star" style="font-size:14px" aria-hidden="true"></i>${r.lwa}</div>
    </div>
    <div class="sbody">${r.resume}</div>
  </div>`;

  html += `<div class="section"><div class="slabel">Étapes du rituel</div><div class="steps">`;
  r.etapes.forEach((e,i) => { html += `<div class="step"><span class="step-num">${i+1}.</span><span>${e}</span></div>`; });
  html += `</div></div>`;

  html += `<div class="section"><div class="slabel">Ingrédients et matériel</div><div class="ingr-grid">`;
  r.ingredients.forEach(ing => { html += `<div class="ingr"><i class="ti ti-circle-dot" style="font-size:12px;margin-right:5px" aria-hidden="true"></i>${ing}</div>`; });
  html += `</div></div>`;

  if (r.tip) html += `<div class="section"><div class="tip"><i class="ti ti-bulb" style="font-size:16px;flex-shrink:0" aria-hidden="true"></i><span>${r.tip}</span></div></div>`;
  if (r.warn) html += `<div class="section"><div class="warn"><i class="ti ti-shield-exclamation" style="font-size:16px;flex-shrink:0" aria-hidden="true"></i><span>${r.warn}</span></div></div>`;

  html += `</div></div>`;
  el.innerHTML = html;
}

buildFilters();
buildTags();
render();
</script>
